# Builds the Vite app and deploys dist/ to GitHub Pages.
#
# IMPORTANT one-time setup after this lands on master:
#   GitHub repo → Settings → Pages → Build and deployment →
#   Source: "GitHub Actions" (NOT "Deploy from a branch").
# Until that's switched, Pages will keep serving the old raw-repo root
# and this workflow's deploy step will not take effect.
name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
